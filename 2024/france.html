<div id="menu-container"></div>
<script>
document.addEventListener("DOMContentLoaded", () => {
  fetch("/menu.html")
    .then(response => {
      if (!response.ok) throw new Error("Failed to load menu");
      return response.text();
    })
    .then(html => {
      document.getElementById("menu-container").innerHTML = html;

      setTimeout(() => {
        const menuBtn = document.getElementById("menu-btn");
        const fullscreenMenu = document.getElementById("fullscreen-menu");

        if (!menuBtn || !fullscreenMenu) {
          console.error("Menu elements not found.");
          return;
        }

        const openMenuSVG = `<svg viewBox="0 0 24 24" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="m196lzck" width="30"><path fill="currentColor" d="M19 6 6 19M6 6l13 13" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path></svg>`;
        const defaultButtonText = `<svg viewBox="0 0 24 24" focusable="false" class="m196lzck" aria-hidden="true"><path fill="currentColor" d="M 3 5 A 1.0001 1.0001 0 1 0 3 7 L 21 7 A 1.0001 1.0001 0 1 0 21 5 L 3 5 z M 3 11 A 1.0001 1.0001 0 1 0 3 13 L 21 13 A 1.0001 1.0001 0 1 0 21 11 L 3 11 z M 3 17 A 1.0001 1.0001 0 1 0 3 19 L 21 19 A 1.0001 1.0001 0 1 0 21 17 L 3 17 z"></path></svg>`;

        const toggleMenu = () => {
          const isMenuOpen = fullscreenMenu.classList.contains("active");
          if (isMenuOpen) {
            fullscreenMenu.classList.remove("active");
            fullscreenMenu.setAttribute("aria-hidden", "true");
            menuBtn.setAttribute("aria-expanded", "false");
            menuBtn.innerHTML = defaultButtonText;
            document.body.style.overflow = "";
          } else {
            fullscreenMenu.classList.add("active");
            fullscreenMenu.setAttribute("aria-hidden", "false");
            menuBtn.setAttribute("aria-expanded", "true");
            menuBtn.innerHTML = openMenuSVG;
            document.body.style.overflow = "hidden";
          }
        };

        menuBtn.addEventListener("click", toggleMenu);
      }, 100);
    })
    .catch(error => console.error("Error loading menu:", error));
});
</script>
