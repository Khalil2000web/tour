<button id="scrollToTopBtn" onclick="scrollToTop()">↑ Top</button>
<script>
window.onscroll = function () {
  let btn = document.getElementById("scrollToTopBtn");
  if (document.body.scrollTop > 7500 || document.documentElement.scrollTop > 7500) {
    btn.style.display = "block";
  } else {
    btn.style.display = "none";
  }
};

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: "smooth" });
}
</script>
<script>
document.addEventListener('copy', function (e) {
  const selection = window.getSelection();
  const imgElement = document.querySelector('img');

  if (selection.containsNode(imgElement, true)) {
    e.preventDefault();

    const imgAltText = imgElement.alt || '⠀⠀⠀⠀⠀⠀';

    e.clipboardData.setData('text/plain', imgAltText);
    e.clipboardData.setData('text/html', imgAltText);

    e.clipboardData.clearData();
  }
}, false);
</script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const mediaElements = document.querySelectorAll('.media');
  
    function muteAllVideos() {
      mediaElements.forEach(media => {
        const video = media.querySelector('video');
        if (video) {
          video.muted = true;
          const soundOffIcon = media.querySelector('.sound-off-icon');
          const soundOnIcon = media.querySelector('.sound-on-icon');
          soundOffIcon.style.display = 'block';
          soundOnIcon.style.display = 'none';
          video.play();
        }
      });
    }
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const video = entry.target;
        if (!entry.isIntersecting && !video.muted) {
          video.muted = true;
          const media = video.closest('.media');
          if (media) {
            const soundOffIcon = media.querySelector('.sound-off-icon');
            const soundOnIcon = media.querySelector('.sound-on-icon');
            soundOffIcon.style.display = 'block';
            soundOnIcon.style.display = 'none';
          }
        }
      });
    }, { threshold: 0.1 });
  
mediaElements.forEach(media => {
const video = media.querySelector('video');
const soundOffIcon = media.querySelector('.sound-off-icon');
const soundOnIcon = media.querySelector('.sound-on-icon');
const playBtn = media.querySelector('.play-btn');
const spinner = media.querySelector('.spinner');
const errorMessage = document.createElement('div');
      
errorMessage.classList.add('error-message');
errorMessage.style.display = 'none';
errorMessage.innerHTML = `
<div style="padding: 20px;">
<svg style="display:block;" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#EED202" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5m.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/></svg>
<strong>Error:</strong> Video could not be loaded.<br><br>
<span style="font-size:0.8rem;color:#ccc;">This may be due to a failed loading attempt or an invalid video URL. Try to reload the page.</span><br><br>
</div>
`;
      media.appendChild(errorMessage);
  
      video.removeAttribute('controls');
  
      video.addEventListener('waiting', () => {
        spinner.style.display = 'block';
      });
  
      video.addEventListener('canplay', () => {
        spinner.style.display = 'none';
      });
  
      video.addEventListener('error', () => {
        spinner.style.display = 'none';
        errorMessage.style.display = 'block';
      });
  
      playBtn.addEventListener('click', () => {
        if (video.paused) {
          video.play();
          playBtn.style.display = 'none';
        }
      });
  
      video.addEventListener('pause', () => {
        playBtn.style.display = 'block';
      });
  
      video.addEventListener('play', () => {
        playBtn.style.display = 'none';
      });
  
      soundOffIcon.addEventListener('click', () => {
        muteAllVideos();
        video.muted = false;
        soundOffIcon.style.display = 'none';
        soundOnIcon.style.display = 'block';
      });
  
      soundOnIcon.addEventListener('click', () => {
        video.muted = true;
        soundOffIcon.style.display = 'block';
        soundOnIcon.style.display = 'none';
      });
  
      observer.observe(video);
    });
  });
</script>
